title: "DICT@YDRI.UESTC"
name: "Digital & Intelligence Convergence Team"
description: "数智融合创新研究团队"
logo: /assets/images/logo.png

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

locale: "en-US"
markdown: kramdown

plugins:
  - jekyll-include-cache

include:
  - _pages

author:
  name: "DICT Team"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/UESTC-HZ"

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: false
      share: false
      comments: false

url: "https://uestc-hz.github.io"
baseurl: ""

